name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Frontend build ─────────────────────────────────────────
  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── 2. Backend checks ─────────────────────────────────────────
  backend:
    name: Backend (install & health check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Check server starts and /api/health responds
        working-directory: backend
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          curl --fail http://localhost:4000/api/health
          kill $SERVER_PID
        env:
          PORT: 4000

  # ── 3. Combined build (copy dist → backend/public) ────────────
  combined:
    name: Combined build smoke test
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Copy dist into backend/public
        run: node scripts/copy-dist.js

      - name: Start combined server and verify /api/health
        run: |
          node backend/server.js &
          SERVER_PID=$!
          sleep 3
          curl --fail http://localhost:4000/api/health
          kill $SERVER_PID
        env:
          PORT: 4000
